<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursorセットアップ完了！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 50%, #f5576c 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* 背景の浮遊する丸 */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: float linear infinite;
    }
    .bubble:nth-child(1)  { width: 120px; height: 120px; left: 5%;  top: 80%; background: #fff; animation-duration: 8s;  animation-delay: 0s; }
    .bubble:nth-child(2)  { width:  80px; height:  80px; left: 15%; top: 60%; background: #ffe066; animation-duration: 10s; animation-delay: 1s; }
    .bubble:nth-child(3)  { width: 160px; height: 160px; left: 75%; top: 70%; background: #56ccf2; animation-duration: 12s; animation-delay: 2s; }
    .bubble:nth-child(4)  { width:  60px; height:  60px; left: 85%; top: 20%; background: #f8b500; animation-duration:  9s; animation-delay: 0.5s; }
    .bubble:nth-child(5)  { width: 100px; height: 100px; left: 45%; top: 85%; background: #6fcf97; animation-duration: 11s; animation-delay: 3s; }

    @keyframes float {
      0%   { transform: translateY(0)   rotate(0deg); }
      100% { transform: translateY(-110vh) rotate(720deg); }
    }

    /* カード */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 32px;
      padding: 64px 72px;
      text-align: center;
      max-width: 680px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      animation: popIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* 絵文字アイコン */
    .icon {
      font-size: 72px;
      display: block;
      margin-bottom: 24px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* メインタイトル */
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #ffe066 40%, #f093fb 80%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    /* サブメッセージ */
    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.7;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* 区切り線 */
    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #ffe066, #f093fb, #56ccf2);
      border-radius: 99px;
      margin: 24px auto;
    }

    /* バッジ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 99px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6fcf97;
      box-shadow: 0 0 0 0 rgba(111, 207, 151, 0.6);
      animation: ping 1.5s ease-in-out infinite;
    }

    @keyframes ping {
      0%  { box-shadow: 0 0 0 0   rgba(111, 207, 151, 0.6); }
      70% { box-shadow: 0 0 0 10px rgba(111, 207, 151, 0); }
      100%{ box-shadow: 0 0 0 0   rgba(111, 207, 151, 0); }
    }
  </style>
</head>
<body>

  <!-- 浮遊バブル -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <!-- メインカード -->
  <div class="card">
    <span class="icon">🚀</span>
    <h1>Cursorセットアップ完了！</h1>
    <div class="divider"></div>
    <p>AIと一緒にものづくりを始める準備ができました</p>
    <div class="badge">
      <span class="badge-dot"></span>
      Ready to build with AI
    </div>
  </div>

</body>
</html>
