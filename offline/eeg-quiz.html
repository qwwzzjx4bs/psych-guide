<script>
lucide.createIcons();

// ===== Waveform drawing (shared utility) =====
function pseudoNoise(t, seed) {
  return Math.sin(t * 127.3 + seed * 43.7) * 0.5
       + Math.sin(t * 83.1 + seed * 29.1) * 0.3
       + Math.sin(t * 51.7 + seed * 17.9) * 0.2;
}

const DRAWFNS = {
  alpha(ctx, W, H) {
    ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const n = pseudoNoise(t,0)*2;
      x===0 ? ctx.moveTo(x, H/2-Math.sin(2*Math.PI*10*t)*H*0.35-n)
            : ctx.lineTo(x, H/2-Math.sin(2*Math.PI*10*t)*H*0.35-n);
    }
    ctx.stroke();
  },
  delta(ctx, W, H) {
    ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 2; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*8; const n = pseudoNoise(t,1)*5;
      x===0 ? ctx.moveTo(x, H/2-Math.sin(2*Math.PI*1.5*t)*H*0.40-n)
            : ctx.lineTo(x, H/2-Math.sin(2*Math.PI*1.5*t)*H*0.40-n);
    }
    ctx.stroke();
  },
  spikeWave(ctx, W, H) {
    ctx.strokeStyle = '#f87171'; ctx.lineWidth = 1.8; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const ph = t*3; const fr = ph - Math.floor(ph);
      const val = fr < 0.12 ? Math.sin(fr/0.12*Math.PI*2)*H*0.42 : -Math.sin((fr-0.12)/0.88*Math.PI)*H*0.20;
      x===0 ? ctx.moveTo(x,H/2-(val+pseudoNoise(t,0)*2)) : ctx.lineTo(x,H/2-(val+pseudoNoise(t,0)*2));
    }
    ctx.stroke();
  },
  spindle(ctx, W, H) {
    ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*8; const cy = t/3.2; const cf = cy-Math.floor(cy);
      const env = cf < 0.42 ? Math.sin(cf/0.42*Math.PI) : 0;
      const n = pseudoNoise(t,2)*2;
      x===0 ? ctx.moveTo(x, H/2-Math.sin(2*Math.PI*13*t)*H*0.38*env-n*0.5)
            : ctx.lineTo(x, H/2-Math.sin(2*Math.PI*13*t)*H*0.38*env-n*0.5);
    }
    ctx.stroke();
  },
  triphasic(ctx, W, H) {
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const ph = t*1.5; const fr = ph-Math.floor(ph);
      let v = 0;
      if (fr<0.12) v=-H*0.18*Math.sin(fr/0.12*Math.PI);
      else if (fr<0.45) v=H*0.40*Math.sin((fr-0.12)/0.33*Math.PI);
      else if (fr<0.62) v=-H*0.16*Math.sin((fr-0.45)/0.17*Math.PI);
      x===0 ? ctx.moveTo(x,H/2-(v+pseudoNoise(t,2)*2)) : ctx.lineTo(x,H/2-(v+pseudoNoise(t,2)*2));
    }
    ctx.stroke();
  },
  polyspike(ctx, W, H) {
    ctx.strokeStyle = '#fb923c'; ctx.lineWidth = 1.8; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*5; const ph = t*4; const fr = ph-Math.floor(ph);
      let v = 0;
      if (fr<0.05) v=H*0.42*Math.sin(fr/0.05*Math.PI*2);
      else if (fr<0.10) v=H*0.32*Math.sin((fr-0.05)/0.05*Math.PI*2);
      else if (fr<0.15) v=H*0.22*Math.sin((fr-0.10)/0.05*Math.PI*2);
      else v=-H*0.18*Math.sin((fr-0.15)/0.85*Math.PI);
      x===0 ? ctx.moveTo(x,H/2-(v+pseudoNoise(t,3)*2)) : ctx.lineTo(x,H/2-(v+pseudoNoise(t,3)*2));
    }
    ctx.stroke();
  },
  burstSupp(ctx, W, H) {
    ctx.strokeStyle = '#67e8f9'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*10; const cy = t/3.0; const cf = cy-Math.floor(cy);
      let v = cf < 0.32 ? Math.sin(2*Math.PI*3*t)*H*0.36+pseudoNoise(t,0)*H*0.10 : pseudoNoise(t*5,3)*H*0.02;
      x===0 ? ctx.moveTo(x,H/2-v) : ctx.lineTo(x,H/2-v);
    }
    ctx.stroke();
  },
  flatLine(ctx, W, H) {
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*8; const n = pseudoNoise(t*5,8)*H*0.015;
      x===0 ? ctx.moveTo(x,H/2-n) : ctx.lineTo(x,H/2-n);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(148,163,184,0.7)'; ctx.font = '10px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('平坦（等電位）', W/2, H/2-8); ctx.textAlign = 'left';
  },
  focalSlowing(ctx, W, H) {
    // top = normal, bottom = focal slowing
    ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*5; const n = pseudoNoise(t,0)*1.5;
      x===0 ? ctx.moveTo(x, H*0.28-Math.sin(2*Math.PI*10*t)*H*0.14-n)
            : ctx.lineTo(x, H*0.28-Math.sin(2*Math.PI*10*t)*H*0.14-n);
    }
    ctx.stroke();
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*5; const n = pseudoNoise(t,7)*3;
      x===0 ? ctx.moveTo(x, H*0.72-Math.sin(2*Math.PI*2.5*t)*H*0.20-n)
            : ctx.lineTo(x, H*0.72-Math.sin(2*Math.PI*2.5*t)*H*0.20-n);
    }
    ctx.stroke();
  },
  bectsSpike(ctx, W, H) {
    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*5; const n = pseudoNoise(t,5)*2;
      x===0 ? ctx.moveTo(x, H/2-Math.sin(2*Math.PI*9*t)*H*0.08-n)
            : ctx.lineTo(x, H/2-Math.sin(2*Math.PI*9*t)*H*0.08-n);
    }
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const sx = W*(0.2+i*0.3);
      ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 2.5; ctx.beginPath();
      ctx.moveTo(sx-5,H/2); ctx.lineTo(sx,H/2-H*0.42); ctx.lineTo(sx+10,H/2+H*0.22); ctx.lineTo(sx+30,H/2);
      ctx.stroke();
    }
  },
  muRhythm(ctx, W, H) {
    ctx.strokeStyle = '#a3e635'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const n = pseudoNoise(t,6)*2;
      const mu = Math.sin(2*Math.PI*10*t)*H*0.30 + Math.sin(2*Math.PI*10*t*2)*H*0.08;
      x===0 ? ctx.moveTo(x, H/2-mu-n) : ctx.lineTo(x, H/2-mu-n);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(163,230,53,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('C3/C4（中心部）', W/2, 14); ctx.textAlign='left';
  },
  firda(ctx, W, H) {
    ctx.strokeStyle = '#f0abfc'; ctx.lineWidth = 2; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const cy = t/1.5; const cf = cy-Math.floor(cy);
      const burst = cf < 0.50;
      let v = burst ? Math.sin(2*Math.PI*1.5*t)*H*0.38+pseudoNoise(t,4)*H*0.05 : pseudoNoise(t,4)*H*0.04;
      x===0 ? ctx.moveTo(x, H/2-v) : ctx.lineTo(x, H/2-v);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(240,171,252,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('前頭部優位', W/2, 14); ctx.textAlign='left';
  },
  remSleep(ctx, W, H) {
    ctx.strokeStyle = '#7dd3fc'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6;
      const v = Math.sin(2*Math.PI*7*t)*H*0.10+Math.sin(2*Math.PI*4*t)*H*0.08+pseudoNoise(t,9)*H*0.08;
      x===0 ? ctx.moveTo(x, H/2-v) : ctx.lineTo(x, H/2-v);
    }
    ctx.stroke();
    // Saw-tooth eye movement markers
    ctx.strokeStyle = '#f97316'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const rem = (t*2)%1;
      const eye = rem < 0.5 ? H*0.28*rem*2 : H*0.28*(1-rem)*2;
      x===0 ? ctx.moveTo(x, H*0.12+eye) : ctx.lineTo(x, H*0.12+eye);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(253,186,116,0.8)'; ctx.font='9px sans-serif'; ctx.fillText('眼球運動（REM）',4,12);
    ctx.fillStyle='rgba(125,211,252,0.8)'; ctx.fillText('混合周波数・低振幅EEG',4,H-6);
  },
  grda(ctx, W, H) {
    ctx.strokeStyle = '#c4b5fd'; ctx.lineWidth = 2; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*8;
      const v = Math.sin(2*Math.PI*1.5*t)*H*0.40+pseudoNoise(t,5)*H*0.04;
      x===0 ? ctx.moveTo(x, H/2-v) : ctx.lineTo(x, H/2-v);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(196,181,253,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('全般性律動性δ（GRDA）', W/2, 14); ctx.textAlign='left';
  },
  kComplex(ctx, W, H) {
    ctx.strokeStyle = '#86efac'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const n = pseudoNoise(t,11)*H*0.03;
      x===0 ? ctx.moveTo(x, H/2-n) : ctx.lineTo(x, H/2-n);
    }
    ctx.stroke();
    // K-complex at t~2
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const dt = t-2.0;
      let kc = 0;
      if (dt >= -0.12 && dt < 0) kc = -H*0.36*(dt+0.12)/0.12;
      else if (dt >= 0 && dt < 0.25) kc = H*0.36*Math.sin(dt/0.25*Math.PI);
      x===0 ? ctx.moveTo(x, H/2-kc) : ctx.lineTo(x, H/2-kc);
    }
    ctx.stroke();
    // spindle after K
    ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const dt = t-2.8; const sp = dt>=0&&dt<0.5?Math.sin(dt/0.5*Math.PI)*H*0.22:0;
      x===0 ? ctx.moveTo(x, H/2-Math.sin(2*Math.PI*13*(x/W*6))*sp) : ctx.lineTo(x, H/2-Math.sin(2*Math.PI*13*(x/W*6))*sp);
    }
    ctx.stroke();
  },
  lpds(ctx, W, H) {
    ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const n = pseudoNoise(t,7)*H*0.03;
      x===0 ? ctx.moveTo(x, H/2-n) : ctx.lineTo(x, H/2-n);
    }
    ctx.stroke();
    for (let i = 0; i < 5; i++) {
      const sx = W*(0.08+i*0.20);
      ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2; ctx.beginPath();
      ctx.moveTo(sx,H/2); ctx.lineTo(sx+3,H/2-H*0.40); ctx.lineTo(sx+8,H/2+H*0.20); ctx.lineTo(sx+18,H/2-H*0.10); ctx.lineTo(sx+26,H/2);
      ctx.stroke();
    }
    ctx.fillStyle='rgba(165,180,252,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('一側性周期性放電（LPDs）', W/2, 14); ctx.textAlign='left';
  },
  sharpWave(ctx, W, H) {
    ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*6; const n = pseudoNoise(t,8)*H*0.025;
      x===0 ? ctx.moveTo(x, H/2-n) : ctx.lineTo(x, H/2-n);
    }
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const sx = W*(0.18+i*0.30);
      ctx.strokeStyle = '#fcd34d'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx-6,H/2); ctx.lineTo(sx,H/2-H*0.38); ctx.lineTo(sx+14,H/2+H*0.22); ctx.lineTo(sx+38,H/2);
      ctx.stroke();
    }
    ctx.fillStyle='rgba(252,211,77,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('鋭波（Sharp wave, 70-200ms）', W/2, 14); ctx.textAlign='left';
  },
  hypsarrhythmia(ctx, W, H) {
    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const t = x/W*8;
      const v = pseudoNoise(t,12)*H*0.38 + pseudoNoise(t*2.5,7)*H*0.20 + Math.sin(2*Math.PI*1.2*t)*H*0.15;
      x===0 ? ctx.moveTo(x, H/2-v) : ctx.lineTo(x, H/2-v);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(244,114,182,0.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Hypsarrhythmia（混沌・高振幅）', W/2, 14); ctx.textAlign='left';
  },
};

function drawWave(canvas, fnKey) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width; const H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let x=0; x<W; x+=W/8) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=H/4) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  if (DRAWFNS[fnKey]) DRAWFNS[fnKey](ctx, W, H);
}

// ===== Quiz data =====
const QUIZ_DATA = {
  1: [
    {
      id: 'q1_1',
      waveKey: 'alpha',

// ===== State =====
const STORAGE_KEY = 'eeg_quiz_state';
let state = { level: 1, current: 0, scores: {1:0,2:0,3:0}, answered: {} };

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = {...state, ...JSON.parse(saved)};
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function setLevel(n) {
  state.level = n;
  state.current = 0;
  [1,2,3].forEach(i => {
    const b = document.getElementById('lbtn-'+i);
    if (i === n) {
      b.classList.add('active');
      b.style.background = '#312e81';
      b.style.borderColor = '#312e81';
    } else {
      b.classList.remove('active');
      b.style.background = '';
      b.style.borderColor = '';
    }
  });
  renderQuestion();
}

function resetQuiz() {
  state.current = 0;
  state.scores[state.level] = 0;
  const questions = QUIZ_DATA[state.level];
  questions.forEach(q => { delete state.answered[q.id]; });
  saveState();
  document.getElementById('result-panel').classList.add('hidden');
  renderQuestion();
}

function renderQuestion() {
  const questions = QUIZ_DATA[state.level];
  const idx = state.current;
  if (idx >= questions.length) { showResult(); return; }
  const q = questions[idx];
  const total = questions.length;
  const score = state.scores[state.level] || 0;
  const answeredData = state.answered[q.id];

  // Update progress
  document.getElementById('progress-label').textContent = `問題 ${idx+1} / ${total}`;
  document.getElementById('score-label').textContent = `正答: ${score}`;
  document.getElementById('progress-bar').style.width = `${(idx/total)*100}%`;

  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-4">
      <div class="p-4 border-b border-slate-100">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">Level ${state.level}</span>
          <span class="text-xs text-slate-400">問題 ${idx+1}</span>
        </div>
        ${q.context ? `<p class="text-sm text-slate-600 bg-slate-50 rounded-lg p-3 border border-slate-200 leading-relaxed mb-3">${q.context}</p>` : ''}
        <p class="font-bold text-slate-800">${q.question}</p>
      </div>
      <canvas id="quiz-canvas" height="110" style="width:100%;background:#0f172a;display:block;"></canvas>
      <div class="p-4 space-y-2" id="choices-area"></div>
      ${answeredData ? `<div id="explanation-box" class="mx-4 mb-2 p-4 rounded-xl border ${answeredData.correct ? 'bg-green-50 border-green-200' : 'bg-rose-50 border-rose-200'}">
        <p class="text-xs font-bold mb-1 ${answeredData.correct ? 'text-green-700' : 'text-rose-700'}">${answeredData.correct ? '正解！' : '不正解'}</p>
        <p class="text-sm text-slate-700 leading-relaxed">${q.explanation}</p>
      </div>
      <div id="srs-badge-area" class="mx-4 mb-4"></div>` : ''}
    </div>
    ${answeredData ? `<div class="flex justify-end"><button onclick="nextQuestion()" class="flex items-center gap-1.5 px-5 py-2.5 bg-indigo-700 hover:bg-indigo-800 text-white rounded-xl text-sm font-bold transition-colors">
      ${idx+1 < total ? '次の問題' : '結果を見る'}
      <i data-lucide="${idx+1 < total ? 'arrow-right' : 'award'}" class="w-4 h-4"></i>
    </button></div>` : ''}
  `;

  // Draw waveform
  const canvas = document.getElementById('quiz-canvas');
  if (canvas) {
    canvas.width = canvas.offsetWidth || 600;
    drawWave(canvas, q.waveKey);
  }

  // Render choices
  const ca = document.getElementById('choices-area');
  if (ca) {
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      let extraClass = '';
      if (answeredData) {
        if (i === q.correct) extraClass = ' revealed';
        else if (answeredData.chosen === i && i !== q.correct) extraClass = ' wrong';
        btn.disabled = true;
      }
      btn.className = 'choice-btn' + extraClass;
      btn.innerHTML = `
        <span class="choice-label">${String.fromCharCode(65+i)}</span>
        <span>${c}</span>
        ${answeredData && i === q.correct ? '<i data-lucide="check" class="w-4 h-4 ml-auto text-green-600"></i>' : ''}
        ${answeredData && answeredData.chosen === i && i !== q.correct ? '<i data-lucide="x" class="w-4 h-4 ml-auto text-red-600"></i>' : ''}
      `;
      if (!answeredData) {
        btn.onclick = () => answerQuestion(i);
      } else {
        btn.disabled = true;
      }
      ca.appendChild(btn);
    });
  }

  lucide.createIcons();

  // Show SRS next-review badge after answer
  if (answeredData) {
    const badgeArea = document.getElementById('srs-badge-area');
    if (badgeArea && typeof srsGetCard === 'function') {
      const card = srsGetCard(q.id);
      if (card) {
        const due = card.dueDate;
        const today = typeof todayStr === 'function' ? todayStr() : new Date().toISOString().slice(0,10);
        const diff = Math.round((new Date(due+'T00:00:00') - new Date(today+'T00:00:00')) / 86400000);
        const label = diff <= 0 ? '今日また出題されます' : diff === 1 ? '明日復習予定' : `${diff}日後に復習予定`;
        badgeArea.innerHTML = `<span class="inline-flex items-center gap-1.5 text-xs bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-full px-3 py-1 font-medium">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          ${label} (SRS)</span>`;
      }
    }
  }
}

function answerQuestion(chosen) {
  const questions = QUIZ_DATA[state.level];
  const q = questions[state.current];
  const correct = chosen === q.correct;
  state.answered[q.id] = { chosen, correct };
  if (correct) state.scores[state.level] = (state.scores[state.level] || 0) + 1;
  saveState();
  // SRS: register card on first answer
  if (typeof srsRegister === 'function') {
    srsRegister(q.id, 'quiz');
    srsAnswer(q.id, correct ? SRS_SCORE.GOOD : SRS_SCORE.INCORRECT_HARD, 'quiz');
  }
  renderQuestion();
}

function nextQuestion() {
  state.current++;
  saveState();
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('result-panel').classList.remove('hidden');
  const total = QUIZ_DATA[state.level].length;
  const score = state.scores[state.level] || 0;
  document.getElementById('result-score').textContent = `${score} / ${total} 問正解`;
  const pct = score / total;
  let msg = '';
  if (pct >= 0.8) msg = '素晴らしい！次のレベルに挑戦しましょう。';
  else if (pct >= 0.6) msg = '合格ライン。波形図鑑で復習してから再挑戦してみましょう。';
  else msg = '波形図鑑で基本パターンを再確認してから再挑戦しましょう。';
  document.getElementById('result-msg').textContent = msg;

  document.getElementById('progress-bar').style.width = `100%`;
  document.getElementById('progress-label').textContent = `全問完了`;
  lucide.createIcons();
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  loadState();
  setLevel(state.level);
});
</script>
