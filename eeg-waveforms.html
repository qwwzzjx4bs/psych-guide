<script>
lucide.createIcons();

// ===== Waveform drawing utilities =====
function pseudoNoise(t, seed) {
  return Math.sin(t * 127.3 + seed * 43.7) * 0.5
       + Math.sin(t * 83.1 + seed * 29.1) * 0.3
       + Math.sin(t * 51.7 + seed * 17.9) * 0.2;
}

function drawPattern(canvas, patternId) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += W/8) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += H/4) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const p = PATTERNS[patternId];
  if (!p || !p.draw) return;
  p.draw(ctx, W, H);
}

function sineWave(ctx, W, H, freq, amp, color, noise=2, lineW=1.5, phaseOff=0, win=6) {
  ctx.strokeStyle = color; ctx.lineWidth = lineW; ctx.beginPath();
  for (let x = 0; x < W; x++) {
    const t = (x / W) * win + phaseOff;
    const n = pseudoNoise(t, phaseOff * 7) * noise;
    const y = H/2 - (Math.sin(2 * Math.PI * freq * t) * amp + n);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ===== Pattern data =====
const PATTERNS = {
  // NORMAL
  alpha_normal: {
    name: 'α波（正常覚醒・閉眼）', cat: 'normal', catLabel: '正常', short: '8-13Hz、後頭部優位、閉眼安静時',
    detail: {
      freq: '8–13 Hz', amplitude: '20–100 μV',
      appear: '後頭部（O1/O2）優位。閉眼・安静時に増大し、開眼・思考・計算で抑制される（Berger効果）。',
      clinical: '成人正常脳波の基本律動。後頭部α波の消失や非対称は病的。α波が8Hz未満（成人）は脳機能低下のサイン。',
      tip: '脳波読影の最初に後頭部α波の有無・対称性・周波数を確認する習慣をつける。'
    },
    draw(ctx, W, H) {
      sineWave(ctx, W, H, 10, H*0.38, '#4ade80', 2, 1.5);
    }
  },
  eyes_open: {
    name: 'α抑制（開眼）', cat: 'normal', catLabel: '正常', short: 'α波が抑制され低振幅βに移行',
    detail: {
      freq: '13–30 Hz（β）', amplitude: '5–20 μV',
      appear: '開眼・思考・感覚刺激によりα波が消失し、低振幅の混合周波数活動になる。',
      clinical: 'α抑制の欠如（開眼でも後頭部αが持続）は後頭部病変や意識障害を示唆。',
      tip: '記録中に「開眼」の指示を行い、前後の変化を比較することが重要。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#86efac'; ctx.lineWidth = 1.5; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x / W) * 6;
        const env = x < W * 0.35 ? 1 : Math.max(0.1, 1 - (x - W*0.35) / (W * 0.5));
        const n = pseudoNoise(t, 0) * 2;
        const y = H/2 - (Math.sin(2*Math.PI*10*t) * H*0.35 * env + n + pseudoNoise(t*2, 3)*H*0.08*(1-env));
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '10px sans-serif';
      ctx.fillText('開眼', W*0.35 + 4, 16);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W*0.35, 0); ctx.lineTo(W*0.35, H); ctx.stroke();
    }
  },
  mu_rhythm: {
    name: 'μリズム（ミュー律動）', cat: 'normal', catLabel: '正常', short: '中心部8-12Hz、手の運動で抑制',
    detail: {
      freq: '8–12 Hz', amplitude: '20–70 μV',
      appear: '中心部（C3/C4）に出現するα帯域律動。アーチ形（negative arch）の形状が特徴的。',
      clinical: '反対側の手の運動・想像で抑制される。正常変動であり、てんかんとの鑑別が重要。μリズム単独は病的意義なし。',
      tip: 'アーチ形の形状（αのなめらかなサインカーブとは異なる）が識別の鍵。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 1.5; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x / W) * 5;
        const n = pseudoNoise(t, 5) * 2;
        const base = Math.sin(2*Math.PI*10*t);
        const arch = base < 0 ? base * 0.3 : base;
        const y = H/2 - (arch * H*0.35 + n);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  },
  // SLEEP
  sleep_n1: {
    name: '睡眠 Stage N1（θ波）', cat: 'sleep', catLabel: '睡眠', short: '4-8Hz θ波、頂点鋭波',
    detail: {
      freq: '4–8 Hz（θ波）、頂点鋭波（200μV以上）', amplitude: '20–100 μV',
      appear: '入眠期。後頭部α波が消失し、全般性θ波が出現。Cz周囲に頂点鋭波（Vertex sharp wave）が散発。',
      clinical: '総睡眠の5-10%。睡眠ポリグラフ（PSG）の記録段階判定に使用。頂点鋭波の過剰出現は鑑別が必要。',
      tip: '頂点鋭波はCzで最大振幅。後頭部αの消失＋θ波への移行がN1の指標。'
    },
    draw(ctx, W, H) {
      // Background theta
      sineWave(ctx, W, H, 6, H*0.22, '#60a5fa', 3, 1.2);
      // Vertex sharp wave at center
      ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 2; ctx.beginPath();
      const vx = W * 0.52;
      ctx.moveTo(vx - 12, H/2);
      ctx.lineTo(vx, H/2 - H*0.42);
      ctx.lineTo(vx + 18, H/2 + H*0.18);
      ctx.lineTo(vx + 30, H/2);
      ctx.stroke();
    }
  },
  sleep_spindle: {
    name: '睡眠紡錘波（Sleep spindle）', cat: 'sleep', catLabel: '睡眠', short: '12-14Hz、紡錘形包絡、Stage N2',
    detail: {
      freq: '12–14 Hz', amplitude: '20–100 μV',
      appear: 'NREM Stage N2の特徴的所見。前頭〜中心部（Cz優位）に0.5-2秒の紡錘形の速波バーストが周期的に出現。',
      clinical: 'K複合とともにStage N2の判定に必須。紡錘波の消失・非対称は視床病変（脳梗塞等）を示唆する。',
      tip: '紡錘波は「ゆりかご」形の包絡線が特徴。K複合（高振幅の二相性徐波）が先行することも。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 1.5; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x / W) * 8;
        const cycle = t / 3.2;
        const cf = cycle - Math.floor(cycle);
        const env = cf < 0.42 ? Math.sin(cf / 0.42 * Math.PI) : 0;
        const n = pseudoNoise(t, 2) * 2;
        const y = H/2 - (Math.sin(2*Math.PI*13*t) * H*0.38 * env + n * (1-env*0.7));
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  },
  k_complex: {
    name: 'K複合（K-complex）', cat: 'sleep', catLabel: '睡眠', short: '高振幅二相性徐波、Stage N2',
    detail: {
      freq: '0.5–1 Hz（複合波）', amplitude: '75 μV以上（定義）',
      appear: 'Stage N2に出現する高振幅（≥75μV）の二相性複合波。前頭部（Fz/Cz）に最大。外部刺激（音）でも誘発される。',
      clinical: 'K複合は外部刺激に対する脳の「防衛反応」とも言われる。睡眠紡錘波を伴うことも多い。',
      tip: '負相（下向き）＋正相（上向き）の急峻な変化が特徴。振幅75μV以上が定義。'
    },
    draw(ctx, W, H) {
      // Background low-amp activity
      ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 1; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x/W)*6; const n = pseudoNoise(t,4)*3;
        const y = H/2 - (Math.sin(2*Math.PI*13*(t-0.3))*H*0.06 + n);
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      // K-complex at center
      ctx.strokeStyle = '#bfdbfe'; ctx.lineWidth = 2; ctx.beginPath();
      const cx = W*0.45;
      const pts = [
        [cx-5, H/2], [cx+5, H/2 - H*0.08], [cx+12, H/2 + H*0.45],
        [cx+25, H/2 - H*0.32], [cx+42, H/2 + H*0.06], [cx+58, H/2]
      ];
      pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
      ctx.stroke();
    }
  },
  delta_sleep: {
    name: 'δ波（Stage N3・深睡眠）', cat: 'sleep', catLabel: '睡眠', short: '0.5-2Hz、高振幅、慢波睡眠',
    detail: {
      freq: '0.5–2 Hz', amplitude: '75 μV以上',
      appear: 'NREM Stage N3（慢波睡眠・深睡眠）。75μV以上のδ波が全体の20%以上を占める。全般性。',
      clinical: '睡眠の記憶固定・免疫機能に重要。高齢では減少。δ波増加は成長ホルモン分泌と関連。',
      tip: 'δ波と病的な全般性徐波化の鑑別には臨床背景（睡眠中か、覚醒しているか）が重要。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 2; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x/W)*8;
        const n = pseudoNoise(t,1)*4;
        const y = H/2 - (Math.sin(2*Math.PI*1.5*t)*H*0.42 + Math.sin(2*Math.PI*1.0*t)*H*0.12 + n);
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  },
  rem_sleep: {
    name: 'REM睡眠波形', cat: 'sleep', catLabel: '睡眠', short: '低振幅混合周波数、鋸歯状波',
    detail: {
      freq: '混合（θ/β優位）', amplitude: '低振幅 5–30 μV',
      appear: '低振幅の混合周波数活動。覚醒脳波に似ている（逆説睡眠）。鋸歯状波（2-3Hz）が前頭〜中心部に散発。',
      clinical: '夢の大部分はREM睡眠中。REM睡眠行動障害（RBD）ではα-SAN減少・筋電図活動増加。ナルコレプシーではREM直入。',
      tip: '低振幅＋眼球運動アーティファクト（EOG）＋筋弛緩（オトガイ筋EMG）の組み合わせがREM判定の基準。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#7dd3fc'; ctx.lineWidth = 1.3; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x/W)*6;
        const n = pseudoNoise(t,6)*3;
        const saw = ((t*2.5) % 1) * H*0.10;
        const y = H/2 - (Math.sin(2*Math.PI*8*t)*H*0.10 + Math.sin(2*Math.PI*16*t)*H*0.06 + saw + n);
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  },
  // EPILEPSY
  spike: {
    name: '棘波（Spike）', cat: 'epilepsy', catLabel: 'てんかん性', short: '持続20-70ms、鋭頭、てんかん焦点',
    detail: {
      freq: '単発または反復', amplitude: '通常100 μV以上',
      appear: '持続20-70msの急峻な波形。焦点性または全般性に出現。後続緩徐波を伴うことが多い。',
      clinical: 'てんかん性異常放電の基本。焦点性棘波は局所てんかん（側頭葉、前頭葉等）の焦点同定に重要。発作間欠期放電（IED）として記録される。',
      tip: '棘波の定義：持続70ms未満、周囲背景から明確に突出した尖頭波形。70-200msは鋭波（Sharp wave）。'
    },
    draw(ctx, W, H) {
      sineWave(ctx, W, H, 10, H*0.06, '#f87171', 1.5, 1.0);
      // Spike
      for (let s = 0; s < 3; s++) {
        const sx = W*(0.2 + s*0.32);
        ctx.strokeStyle = '#fca5a5'; ctx.lineWidth = 2.5; ctx.beginPath();
        ctx.moveTo(sx-4, H/2);
        ctx.lineTo(sx, H/2 - H*0.45);
        ctx.lineTo(sx+8, H/2 + H*0.2);
        ctx.lineTo(sx+20, H/2);
        ctx.stroke();
      }
    }
  },
  sharp_wave: {
    name: '鋭波（Sharp wave）', cat: 'epilepsy', catLabel: 'てんかん性', short: '持続70-200ms、棘波より幅広',
    detail: {
      freq: '単発または反復', amplitude: '通常50 μV以上',
      appear: '持続70-200msの尖頭波形。棘波より幅広く、後続緩徐波を伴うことが多い。',
      clinical: '局所てんかんの焦点（特に側頭葉・後頭部）でよく認められる。BECTSでは中心・側頭部に出現。',
      tip: '棘波（<70ms）vs 鋭波（70-200ms）の区別は持続時間。どちらもてんかん性放電として重要。'
    },
    draw(ctx, W, H) {
      sineWave(ctx, W, H, 10, H*0.06, '#f87171', 1.5, 1.0);
      for (let s = 0; s < 2; s++) {
        const sx = W*(0.25 + s*0.42);
        ctx.strokeStyle = '#fda4af'; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(sx-8, H/2);
        ctx.lineTo(sx, H/2 - H*0.40);
        ctx.lineTo(sx+16, H/2 + H*0.22);
        ctx.lineTo(sx+38, H/2);
        ctx.stroke();
      }
    }
  },
  spike_wave_3hz: {
    name: '3Hz棘徐波複合', cat: 'epilepsy', catLabel: 'てんかん性', short: '欠神てんかん典型。全般性3Hz',
    detail: {
      freq: '3 Hz', amplitude: '高振幅 100–500 μV',
      appear: '全般性に突然出現し突然終息する規則的な3Hzの棘波＋徐波複合。過呼吸で誘発されやすい。',
      clinical: '小児欠神てんかん（CAE）の典型的所見。10秒以上持続で意識消失（欠神発作）を起こす。バルプロ酸・エトスクシミド・ラモトリギンが有効。',
      tip: '突然の開始と終息、規則的な3Hzが欠神てんかんの特徴。発作中に過呼吸を行うと容易に誘発。'
    },
    draw(ctx, W, H) {
      ctx.strokeStyle = '#f87171'; ctx.lineWidth = 1.8; ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const t = (x/W)*6;
        const phase = t * 3;
        const frac = phase - Math.floor(phase);
        let val;

// ===== Filter & render =====
const filterColors = {
  all:     { active: '#374151', label: 'すべて' },
  normal:  { active: '#15803d', label: '正常' },
  sleep:   { active: '#1e40af', label: '睡眠' },
  epilepsy:{ active: '#b91c1c', label: 'てんかん性' },
  diffuse: { active: '#92400e', label: 'びまん性異常' },
  focal:   { active: '#3730a3', label: '焦点性異常' },
  special: { active: '#6b21a8', label: '特殊パターン' },
};

let currentFilter = 'all';

function filterCards(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.borderColor = '';
  });
  btn.classList.add('active');
  btn.style.background = filterColors[cat]?.active || '#374151';
  btn.style.borderColor = filterColors[cat]?.active || '#374151';
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('wave-grid');
  grid.innerHTML = '';
  Object.entries(PATTERNS).forEach(([id, p]) => {
    if (currentFilter !== 'all' && p.cat !== currentFilter) return;
    const card = document.createElement('div');
    card.className = 'wave-card';
    card.innerHTML = `
      <canvas class="wave-canvas" data-id="${id}" height="90"></canvas>
      <div class="p-3">
        <div class="flex items-start justify-between gap-2 mb-1">
          <h3 class="font-bold text-slate-800 text-sm leading-snug">${p.name}</h3>
          <span class="cat-badge cat-${p.cat} flex-shrink-0">${p.catLabel}</span>
        </div>
        <p class="text-xs text-slate-500 leading-relaxed">${p.short}</p>
        <div class="mt-2 text-xs text-indigo-600 font-medium flex items-center gap-1">
          詳細を見る <i data-lucide="chevron-right" class="w-3 h-3"></i>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(id));
    grid.appendChild(card);
  });

  // Draw all canvases
  lucide.createIcons();
  grid.querySelectorAll('canvas[data-id]').forEach(cv => {
    const id = cv.getAttribute('data-id');
    cv.width = cv.offsetWidth || 300;
    drawPattern(cv, id);
  });
}

  const d = p.detail;

        <div>

          <h2 class="text-xl font-bold text-slate-800">${p.name}</h2>
          <p class="text-sm text-slate-500 mt-0.5">${p.short}</p>
        </div>
        <button onclick="closeModalBtn()" class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <canvas id="modal-canvas" height="110" style="width:100%;background:#0f172a;border-radius:0.5rem;display:block;margin-bottom:1rem;"></canvas>
      <div class="space-y-3 text-sm">
        <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">周波数 / 振幅</p>
          <p class="text-slate-700"><strong>${d.freq}</strong> / ${d.amplitude}</p>
        </div>
        <div class="bg-indigo-50 rounded-lg p-3 border border-indigo-200">
          <p class="text-xs font-bold text-indigo-500 uppercase tracking-wide mb-1">出現様式</p>
          <p class="text-slate-700 leading-relaxed">${d.appear}</p>
        </div>
        <div class="bg-rose-50 rounded-lg p-3 border border-rose-200">
          <p class="text-xs font-bold text-rose-500 uppercase tracking-wide mb-1">臨床的意義</p>
          <p class="text-slate-700 leading-relaxed">${d.clinical}</p>
        </div>
        <div class="bg-amber-50 rounded-lg p-3 border border-amber-200">
          <p class="text-xs font-bold text-amber-600 uppercase tracking-wide mb-1">読影のコツ</p>
          <p class="text-slate-700 leading-relaxed">${d.tip}</p>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  lucide.createIcons();
  // Draw on modal canvas
  requestAnimationFrame(() => {
    const mc = document.getElementById('modal-canvas');
    mc.width = mc.offsetWidth || 600;
    drawPattern(mc, id);
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  // Set initial filter button color
  const allBtn = document.querySelector('.filter-btn.active');
  if (allBtn) { allBtn.style.background = '#374151'; allBtn.style.borderColor = '#374151'; }
  renderGrid();
});

window.addEventListener('resize', () => {
  document.querySelectorAll('canvas[data-id]').forEach(cv => {
    const id = cv.getAttribute('data-id');
    cv.width = cv.offsetWidth;
    drawPattern(cv, id);
  });
});
</script>
</body>
</html>
