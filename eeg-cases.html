<script>
lucide.createIcons();

// ===== Waveform drawing =====
function pseudoNoise(t, seed) {
  return Math.sin(t * 127.3 + seed * 43.7) * 0.5
       + Math.sin(t * 83.1 + seed * 29.1) * 0.3
       + Math.sin(t * 51.7 + seed * 17.9) * 0.2;
}

function drawCanvas(canvas, type) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width; const H = canvas.height;
  ctx.clearRect(0,0,W,H); ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for (let x=0; x<W; x+=W/8) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=H/4) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const draws = {
    spike_wave(ctx,W,H) {
      ctx.strokeStyle='#f87171'; ctx.lineWidth=1.8; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*6; const ph=t*3; const fr=ph-Math.floor(ph);
        const v=fr<0.12?Math.sin(fr/0.12*Math.PI*2)*H*0.42:-Math.sin((fr-0.12)/0.88*Math.PI)*H*0.20;
        x===0?ctx.moveTo(x,H/2-(v+pseudoNoise(t,0)*2)):ctx.lineTo(x,H/2-(v+pseudoNoise(t,0)*2));
      }
      ctx.stroke();
    },
    triphasic(ctx,W,H) {
      ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*6; const ph=t*1.5; const fr=ph-Math.floor(ph);
        let v=0;
        if(fr<0.12) v=-H*0.18*Math.sin(fr/0.12*Math.PI);
        else if(fr<0.45) v=H*0.40*Math.sin((fr-0.12)/0.33*Math.PI);
        else if(fr<0.62) v=-H*0.16*Math.sin((fr-0.45)/0.17*Math.PI);
        x===0?ctx.moveTo(x,H/2-(v+pseudoNoise(t,2)*2)):ctx.lineTo(x,H/2-(v+pseudoNoise(t,2)*2));
      }
      ctx.stroke();
    },
    bects(ctx,W,H) {
      ctx.strokeStyle='#34d399'; ctx.lineWidth=1; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*5; const n=pseudoNoise(t,5)*2;
        x===0?ctx.moveTo(x,H/2-Math.sin(2*Math.PI*9*t)*H*0.06-n):ctx.lineTo(x,H/2-Math.sin(2*Math.PI*9*t)*H*0.06-n);
      }
      ctx.stroke();
      for(let i=0;i<3;i++){
        const sx=W*(0.2+i*0.3);
        ctx.strokeStyle='#6ee7b7'; ctx.lineWidth=2.5; ctx.beginPath();
        ctx.moveTo(sx-5,H/2); ctx.lineTo(sx,H/2-H*0.42); ctx.lineTo(sx+10,H/2+H*0.22); ctx.lineTo(sx+30,H/2);
        ctx.stroke();
      }
    },
    periodic_cjd(ctx,W,H) {
      ctx.strokeStyle='#e879f9'; ctx.lineWidth=0.8; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*8; const n=pseudoNoise(t,9)*2;
        x===0?ctx.moveTo(x,H/2-Math.sin(2*Math.PI*8*t)*H*0.03-n):ctx.lineTo(x,H/2-Math.sin(2*Math.PI*8*t)*H*0.03-n);
      }
      ctx.stroke();
      for(let i=0;i<5;i++){
        const sx=W*(0.08+i*0.2);
        ctx.strokeStyle='#f0abfc'; ctx.lineWidth=2; ctx.beginPath();
        ctx.moveTo(sx,H/2); ctx.lineTo(sx+4,H/2-H*0.35); ctx.lineTo(sx+10,H/2+H*0.20); ctx.lineTo(sx+18,H/2-H*0.12); ctx.lineTo(sx+26,H/2);
        ctx.stroke();
      }
    },
    polyspike(ctx,W,H) {
      ctx.strokeStyle='#fb923c'; ctx.lineWidth=1.8; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*5; const ph=t*4; const fr=ph-Math.floor(ph);
        let v=0;
        if(fr<0.05) v=H*0.42*Math.sin(fr/0.05*Math.PI*2);
        else if(fr<0.10) v=H*0.32*Math.sin((fr-0.05)/0.05*Math.PI*2);
        else if(fr<0.15) v=H*0.22*Math.sin((fr-0.10)/0.05*Math.PI*2);
        else v=-H*0.18*Math.sin((fr-0.15)/0.85*Math.PI);
        x===0?ctx.moveTo(x,H/2-(v+pseudoNoise(t,3)*2)):ctx.lineTo(x,H/2-(v+pseudoNoise(t,3)*2));
      }
      ctx.stroke();
    },
    hypsarrhythmia(ctx,W,H) {
      ctx.strokeStyle='#f472b6'; ctx.lineWidth=1.5; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*8;
        const v=pseudoNoise(t,12)*H*0.38+pseudoNoise(t*2.5,7)*H*0.20+Math.sin(2*Math.PI*1.2*t)*H*0.15;
        x===0?ctx.moveTo(x,H/2-v):ctx.lineTo(x,H/2-v);
      }
      ctx.stroke();
      ctx.fillStyle='rgba(244,114,182,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('Hypsarrhythmia（混沌・高振幅）',W/2,14);ctx.textAlign='left';
    },
    lpds(ctx,W,H) {
      ctx.strokeStyle='#818cf8'; ctx.lineWidth=1; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*6; const n=pseudoNoise(t,7)*H*0.03;
        x===0?ctx.moveTo(x,H/2-n):ctx.lineTo(x,H/2-n);
      }
      ctx.stroke();
      for(let i=0;i<5;i++){
        const sx=W*(0.08+i*0.20);
        ctx.strokeStyle='#a5b4fc'; ctx.lineWidth=2; ctx.beginPath();
        ctx.moveTo(sx,H/2); ctx.lineTo(sx+3,H/2-H*0.40); ctx.lineTo(sx+8,H/2+H*0.20); ctx.lineTo(sx+18,H/2-H*0.10); ctx.lineTo(sx+26,H/2);
        ctx.stroke();
      }
      ctx.fillStyle='rgba(165,180,252,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('LPDs 一側性周期性放電（左側頭部）',W/2,14);ctx.textAlign='left';
    },
    spikeWave(ctx,W,H) {
      ctx.strokeStyle='#f87171'; ctx.lineWidth=1.8; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*6; const ph=t*3; const fr=ph-Math.floor(ph);
        const v=fr<0.12?Math.sin(fr/0.12*Math.PI*2)*H*0.42:-Math.sin((fr-0.12)/0.88*Math.PI)*H*0.20;
        x===0?ctx.moveTo(x,H/2-(v+pseudoNoise(t,0)*2)):ctx.lineTo(x,H/2-(v+pseudoNoise(t,0)*2));
      }
      ctx.stroke();
      ctx.fillStyle='rgba(248,113,113,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('持続的棘徐波複合（NCSE）',W/2,14);ctx.textAlign='left';
    },
    extremeDeltaBrush(ctx,W,H) {
      // Delta base
      ctx.strokeStyle='#c4b5fd'; ctx.lineWidth=2; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*8;
        const dv=Math.sin(2*Math.PI*1.5*t)*H*0.36+pseudoNoise(t,5)*H*0.04;
        x===0?ctx.moveTo(x,H/2-dv):ctx.lineTo(x,H/2-dv);
      }
      ctx.stroke();
      // Beta superimposed on delta peaks
      ctx.strokeStyle='rgba(251,191,36,0.85)'; ctx.lineWidth=1; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*8;
        const dv=Math.sin(2*Math.PI*1.5*t)*H*0.36;
        const beta=Math.sin(2*Math.PI*25*t)*H*0.10*(0.5+0.5*Math.sin(2*Math.PI*1.5*t+Math.PI/2));
        x===0?ctx.moveTo(x,H/2-dv-beta):ctx.lineTo(x,H/2-dv-beta);
      }
      ctx.stroke();
      ctx.fillStyle='rgba(196,181,253,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('Extreme Delta Brush（δ+β重畳）',W/2,14);ctx.textAlign='left';
    },
    deepAnesthesia(ctx,W,H) {
      // Left half: burst-suppression, right half: flat
      ctx.strokeStyle='#67e8f9'; ctx.lineWidth=1.5; ctx.beginPath();
      for(let x=0;x<W;x++){
        const t=x/W*10;
        let v;
        if(x<W*0.52){
          const cy=t/3.0; const cf=cy-Math.floor(cy);
          v=cf<0.32?Math.sin(2*Math.PI*3*t)*H*0.36+pseudoNoise(t,0)*H*0.10:pseudoNoise(t*5,3)*H*0.02;
        } else {
          v=pseudoNoise(t*5,3)*H*0.015;
        }
        x===0?ctx.moveTo(x,H/2-v):ctx.lineTo(x,H/2-v);
      }
      ctx.stroke();
      // Labels
      ctx.fillStyle='rgba(103,232,249,0.7)';ctx.font='10px sans-serif';
      ctx.fillText('Burst-Suppression',4,14);
      ctx.fillStyle='rgba(148,163,184,0.7)';
      ctx.fillText('→ 等電位（ECS）',W*0.55,14);
      // Divider
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(W*0.52,0);ctx.lineTo(W*0.52,H);ctx.stroke();ctx.setLineDash([]);
    },
  };
  if (draws[type]) draws[type](ctx,W,H);
}

// ===== Cases data =====
const CASES = [
  {
    id: 'case1',
    num: 1,
    title: '欠神てんかん（小児欠神てんかん）',
    patient: '30歳女性',
    badge: { text: 'てんかん', color: 'bg-red-100 text-red-800' },
    waveType: 'spike_wave',
    stages: [
      {
        id: 'history',
        label: '病歴',
        icon: 'file-text',
        content: `
          <div class="space-y-3 text-sm text-slate-700">
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">主訴</p>
              <p>突然の意識消失発作（秒単位）が繰り返す</p>
            </div>
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">現病歴</p>
              <p>8歳頃より授業中に「ぼーっとする」ことを指摘されていた。10秒程度で元に戻り、発作中の記憶がない。1日10〜50回起こることもあった。成人後も発作が続いており、今回専門医を受診。</p>
            </div>
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">身体所見・検査</p>
              <p>神経学的診察：正常。MRI：正常。血液・生化学：異常なし。</p>
            </div>
          </div>
          <div class="mt-4 p-3 bg-indigo-50 border border-indigo-200 rounded-lg text-sm text-indigo-800">
            <p class="font-bold mb-1">考えてみましょう</p>
            <p>① どのような脳波所見が予想されますか？<br>② 鑑別すべき疾患は何ですか？</p>
          </div>
        `
      },
      {
        id: 'eeg',
        label: '脳波',
        icon: 'activity',
        content: null,
        isEEG: true,
      },
      {
        id: 'diagnosis',
        label: '診断・治療',
        icon: 'clipboard-check',
        content: `
          <div class="space-y-3 text-sm">
            <div class="flex items-center gap-2 mb-1">
              <span class="dx-badge bg-red-100 text-red-800">診断</span>
              <span class="font-bold text-lg text-slate-800">小児欠神てんかん（Childhood Absence Epilepsy: CAE）</span>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4">
              <p class="font-bold text-red-800 mb-2">脳波所見の解釈</p>
              <ul class="space-y-1.5 text-slate-700">
                <li class="flex gap-2"><span class="text-red-600 font-bold">◆</span>全般性3Hz棘徐波複合（Generalized 3Hz spike-wave complexes）</li>
                <li class="flex gap-2"><span class="text-red-600 font-bold">◆</span>突然の開始・突然の終息（abrupt onset/offset）</li>
                <li class="flex gap-2"><span class="text-red-600 font-bold">◆</span>発作期には意識消失を伴う（10秒以上で顕著）</li>
                <li class="flex gap-2"><span class="text-red-600 font-bold">◆</span>過呼吸で誘発されやすい</li>
              </ul>
            </div>
            <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
              <p class="font-bold text-emerald-800 mb-2">治療方針</p>
              <div class="grid sm:grid-cols-2 gap-2 text-xs">
                <div class="bg-white rounded p-2 border border-emerald-100">
                  <p class="font-bold text-emerald-700">第一選択</p>
                  <p>エトスクシミド（Ethosuximide）500-1000mg/日<br>バルプロ酸（Valproate）500-1500mg/日</p>
                </div>
                <div class="bg-white rounded p-2 border border-emerald-100">
                  <p class="font-bold text-emerald-700">第二選択</p>
                  <p>ラモトリギン（Lamotrigine）<br>※カルバマゼピンは欠神発作を悪化させる可能性</p>
                </div>
              </div>
            </div>
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
              <p class="font-bold text-amber-800 mb-2">補足・鑑別</p>
              <p class="text-slate-700">複雑部分発作との鑑別：欠神発作は通常10秒以内、後遺症なく意識回復、自動症は通常少ない。過呼吸での誘発が鑑別に有用。</p>
            </div>
          </div>
        `
      },
    ]
  },
  {
    id: 'case2',
    num: 2,
    title: '肝性脳症（三相波）',
    patient: '65歳男性',
    badge: { text: '代謝性脳症', color: 'bg-amber-100 text-amber-800' },
    waveType: 'triphasic',
    stages: [
      {
        id: 'history',
        label: '病歴',
        icon: 'file-text',
        content: `
          <div class="space-y-3 text-sm text-slate-700">
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">主訴</p>
              <p>意識障害・反応鈍化（2日前から）</p>
            </div>
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">現病歴</p>
              <p>肝硬変（Child-Pugh C、HCV関連）で通院中。1週間前から食欲低下・傾眠傾向。2日前より家族が「話しかけても返事が遅い、同じことを繰り返す」と気付き救急搬送。来院時、GCS E3V4M5。</p>
            </div>
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <p class="font-bold text-slate-800 mb-1">身体所見・検査</p>
              <p>黄疸（+）、腹水（+）、肝性口臭（+）、flapping tremor（はたはた動作）（+）。<br>血液：NH₃ 210 μg/dL（↑）、AST/ALT 軽度上昇、T.Bil 3.8 mg/dL、PT-INR 1.8。MRI：新規梗塞・出血なし。</p>
            </div>
          </div>
          <div class="mt-4 p-3 bg-indigo-50 border border-indigo-200 rounded-lg text-sm text-indigo-800">
            <p class="font-bold mb-1">考えてみましょう</p>
            <p>① アンモニア上昇・肝疾患・意識障害の組み合わせで予想される脳波所見は？<br>② どのような波形名を知っていますか？</p>
          </div>
        `
      },
      { id: 'eeg', label: '脳波', icon: 'activity', content: null, isEEG: true },
      {
        id: 'diagnosis',
        label: '診断・治療',
        icon: 'clipboard-check',
        content: `
          <div class="space-y-3 text-sm">
            <div class="flex items-center gap-2 mb-1">
              <span class="dx-badge bg-amber-100 text-amber-800">診断</span>
              <span class="font-bold text-lg text-slate-800">肝性脳症 Grade III（三相波）</span>
            </div>
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">

  try { localStorage.setItem(CASE_STATE_KEY, JSON.stringify(caseState)); } catch(e) {}
}

          <div id="stagepanel-${c.id}-${si}" class="stage-panel ${si === cs.openStage ? 'active' : ''}">
            ${s.isEEG ? `
              <canvas id="eegcanvas-${c.id}-${si}" height="120" class="eeg-canvas mb-3"></canvas>
              <div class="mt-2 p-3 bg-slate-800 rounded-xl mb-4">
                <p class="text-xs font-bold text-slate-300 mb-1">読影のポイント</p>
                <ul class="text-xs text-slate-400 space-y-1">
                  <li>・周波数（速いか、遅いか）</li>
                  <li>・出現様式（全般性か、焦点性か）</li>
                  <li>・波形の形（正弦波・棘波・三相波・複合波）</li>
                  <li>・背景活動の状態</li>
                </ul>
              </div>
              <button onclick="unlockNextStage('${c.id}',${si})" class="reveal-btn mb-2">
                <i data-lucide="eye" class="w-4 h-4"></i>
                診断・解説を見る
              </button>
            ` : s.content || ''}
            ${!s.isEEG && si < c.stages.length - 1 ? `
              <div class="mt-4 pt-4 border-t border-slate-200 flex justify-end">
                <button type="button" onclick="unlockNextStage('${c.id}',${si})" class="reveal-btn">
                  次のステップへ：${c.stages[si + 1].label}
                  <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
              </div>
            ` : ''}
            ${si === c.stages.length - 2 ? `
              <div class="mt-4 pt-4 border-t border-slate-200 flex justify-end">
                <button onclick="unlockNextStage('${c.id}',${si})" class="reveal-btn">
                  診断・解説を見る
                  <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
              </div>
            ` : ''}
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(el);
  });

  lucide.createIcons();

  // Draw EEG canvases for visible stages
  CASES.forEach(c => {
    const cs = getCaseState(c.id);
    if (cs.unlocked.includes(1)) {
      drawEEGForCase(c.id, c.waveType);
    }
  });
}

function toggleCase(caseId) {
  const body = document.getElementById('casebody-' + caseId);
  const chevron = document.getElementById('chevron-' + caseId);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
  if (!isOpen) {
    // Draw EEG if unlocked
    const cs = getCaseState(caseId);
    if (cs.unlocked.includes(1)) {
      const c = CASES.find(x => x.id === caseId);
      if (c) setTimeout(() => drawEEGForCase(caseId, c.waveType), 50);
    }
  }
}

function showStage(caseId, stageIdx) {
  const cs = getCaseState(caseId);
  if (!cs.unlocked.includes(stageIdx)) return;
  cs.openStage = stageIdx;
  saveCaseState();

  const c = CASES.find(x => x.id === caseId);
  c.stages.forEach((_,si) => {
    const panel = document.getElementById(`stagepanel-${caseId}-${si}`);
    const btn = document.getElementById(`stagebtn-${caseId}-${si}`);
    if (panel) panel.classList.toggle('active', si === stageIdx);
    if (btn) {
      const locked = !cs.unlocked.includes(si);
      btn.disabled = locked;
      btn.classList.toggle('opacity-40', locked);
      btn.classList.toggle('cursor-not-allowed', locked);
      btn.classList.toggle('active', si === stageIdx);
      btn.classList.toggle('unlocked', !locked && si !== stageIdx);
      if (locked) btn.setAttribute('title', '前のステップを完了してください');
      else btn.removeAttribute('title');
    }
  });

  // Draw EEG if this is the EEG stage
  if (c.stages[stageIdx].isEEG) {
    setTimeout(() => drawEEGForCase(caseId, c.waveType), 50);
  }
}

function unlockNextStage(caseId, currentStageIdx) {
  const cs = getCaseState(caseId);
  const nextIdx = currentStageIdx + 1;
  if (!cs.unlocked.includes(nextIdx)) cs.unlocked.push(nextIdx);
  saveCaseState();
  showStage(caseId, nextIdx);
  lucide.createIcons();
}

function drawEEGForCase(caseId, waveType) {
  const c = CASES.find(x => x.id === caseId);
  if (!c) return;
  const eegStageIdx = c.stages.findIndex(s => s.isEEG);
  if (eegStageIdx < 0) return;
  const canvas = document.getElementById(`eegcanvas-${caseId}-${eegStageIdx}`);
  if (!canvas) return;
  canvas.width = canvas.offsetWidth || 600;
  drawCanvas(canvas, waveType);
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  loadCaseState();
  renderCases();
});
</script>
</body>
</html>
