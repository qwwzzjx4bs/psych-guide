version: "3.9"

services:
  api:
    build: .
    container_name: psych-literature-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite DB 永続化
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:////app/data/literature.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  data:
