<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンテンツ検証ツール — 精神科臨床ガイド</title>
  <link rel="canonical" href="https://qwwzzjx4bs.github.io/psych-guide/content-verification.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: #f4f2ef;
      color: #232323;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'palt';
    }
    a { text-decoration: none; }

    /* === Status badges === */
    .status-ok    { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .status-warn  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .status-flag  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .status-skip  { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }

    /* === Card row === */
    .verify-card {
      background: #fff;
      border: 1px solid #e2e0dd;
      border-radius: 12px;
      transition: box-shadow 0.15s;
    }
    .verify-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .verify-card.confirmed { border-left: 4px solid #10b981; }
    .verify-card.has-flag  { border-left: 4px solid #ef4444; }
    .verify-card.has-warn  { border-left: 4px solid #f59e0b; }

    /* === Axis panels === */
    .axis-panel { border-radius: 8px; padding: 10px 12px; font-size: 0.75rem; }
    .axis-dosage   { background: #eff6ff; border: 1px solid #bfdbfe; }
    .axis-notation { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .axis-terms    { background: #faf5ff; border: 1px solid #e9d5ff; }

    /* === Reference table === */
    .ref-table th { background: #f8fafc; font-weight: 600; font-size: 0.7rem; }
    .ref-table td { font-size: 0.7rem; }
    .ref-table tr:hover td { background: #f1f5f9; }

    /* === Filter buttons === */
    .filter-btn { transition: background 0.12s, color 0.12s; }
    .filter-btn.active { background: #3b5bdb; color: #fff; }

    /* === Section badge === */
    .sec-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .sec-calc     { background: #cffafe; color: #164e63; }
    .sec-scales   { background: #e0f2fe; color: #0c4a6e; }
    .sec-diag     { background: #dbeafe; color: #1e3a8a; }
    .sec-tx       { background: #ede9fe; color: #4c1d95; }
    .sec-drugs    { background: #e0e7ff; color: #3730a3; }
    .sec-concepts { background: #fef3c7; color: #78350f; }
    .sec-study    { background: #fce7f3; color: #831843; }
    .sec-lit      { background: #ccfbf1; color: #134e4a; }
    .sec-other    { background: #f1f5f9; color: #334155; }

    /* === Highlight match === */
    mark { background: #fde68a; color: #78350f; border-radius: 2px; padding: 0 2px; }

    /* === Sticky header === */
    #sticky-header {
      position: sticky; top: 0; z-index: 40;
      background: #fff;
      border-bottom: 1px solid #e2e0dd;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* === Stats bar === */
    .stat-box {
      text-align: center;
      padding: 6px 16px;
      border-radius: 8px;
      min-width: 80px;
    }

    /* Export modal */
    #export-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    #export-modal.hidden { display: none; }
    #export-body {
      width: min(90vw, 800px);
      max-height: 80vh;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    #export-text {
      flex: 1;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      line-height: 1.6;
      white-space: pre-wrap;
      padding: 16px;
      background: #f8fafc;
      border: none;
      resize: none;
      outline: none;
    }

    /* Reference drawer */
    #ref-drawer {
      transition: max-height 0.3s ease;
      overflow: hidden;
    }
  </style>
</head>
<body class="min-h-screen">

<!-- Sticky header -->
<div id="sticky-header">
  <div class="max-w-5xl mx-auto px-4 sm:px-6">
    <!-- Title row -->
    <div class="flex items-center justify-between py-3 gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <a href="top.html" class="text-gray-400 hover:text-gray-600 text-xs">← ポータル</a>
        <div class="w-px h-4 bg-gray-200"></div>
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg bg-indigo-700 flex items-center justify-center flex-shrink-0">
            <span class="text-white text-xs font-bold">✓</span>
          </div>
          <div>
            <h1 class="font-bold text-gray-900 text-sm leading-tight">コンテンツ検証ツール</h1>
            <p class="text-xs text-gray-400 leading-tight">用量・表記・精神医学用語 3軸検証</p>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <!-- Stats -->
        <div class="stat-box bg-gray-50 border border-gray-200">
          <div class="text-lg font-bold text-gray-800" id="stat-total">—</div>
          <div class="text-xs text-gray-500">総カード数</div>
        </div>
        <div class="stat-box bg-red-50 border border-red-200">
          <div class="text-lg font-bold text-red-700" id="stat-flag">—</div>
          <div class="text-xs text-red-500">要修正</div>
        </div>
        <div class="stat-box bg-amber-50 border border-amber-200">
          <div class="text-lg font-bold text-amber-700" id="stat-warn">—</div>
          <div class="text-xs text-amber-500">要確認</div>
        </div>
        <div class="stat-box bg-emerald-50 border border-emerald-200">
          <div class="text-lg font-bold text-emerald-700" id="stat-confirmed">—</div>
          <div class="text-xs text-emerald-500">確認済み</div>
        </div>
        <button id="btn-export" onclick="openExport()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          レポート出力
        </button>
        <button onclick="resetAll()"
          class="bg-white hover:bg-gray-50 text-gray-600 text-xs font-medium px-3 py-2 rounded-lg border border-gray-200 transition-colors">
          リセット
        </button>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="pb-3 flex items-center gap-2 flex-wrap">
      <span class="text-xs text-gray-500 font-medium">表示:</span>
      <button class="filter-btn active text-xs px-3 py-1 rounded-full border border-gray-200 bg-gray-50" data-filter="all" onclick="setFilter('all', this)">全表示</button>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-gray-200 bg-gray-50" data-filter="issues" onclick="setFilter('issues', this)">要確認のみ</button>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-gray-200 bg-gray-50" data-filter="unconfirmed" onclick="setFilter('unconfirmed', this)">未確認のみ</button>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-gray-200 bg-gray-50" data-filter="confirmed" onclick="setFilter('confirmed', this)">確認済みのみ</button>
      <div class="w-px h-4 bg-gray-200"></div>
      <span class="text-xs text-gray-500 font-medium">軸:</span>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-blue-200 bg-blue-50 text-blue-700" data-axis="dosage" onclick="toggleAxis('dosage', this)">用量・用法</button>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-green-200 bg-green-50 text-green-700" data-axis="notation" onclick="toggleAxis('notation', this)">日本語表記</button>
      <button class="filter-btn text-xs px-3 py-1 rounded-full border border-purple-200 bg-purple-50 text-purple-700" data-axis="terms" onclick="toggleAxis('terms', this)">精神医学用語</button>
      <div class="w-px h-4 bg-gray-200"></div>
      <select id="section-filter" onchange="setSectionFilter(this.value)"
        class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-700">
        <option value="">セクション: 全て</option>
        <option value="drugs">薬剤選択</option>
        <option value="tx-overview">治療概要</option>
        <option value="diag">診断・分類</option>
        <option value="calc">計算ツール</option>
        <option value="scales">評価スケール</option>
        <option value="concepts">概念・資格</option>
        <option value="study">学習・ドリル</option>
        <option value="literature">最新論文</option>
        <option value="other">その他</option>
      </select>
      <div class="ml-auto">
        <input type="text" id="search-input" placeholder="カード検索…" oninput="setSearch(this.value)"
          class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 bg-white w-36 focus:outline-none focus:border-indigo-300">
      </div>
    </div>
  </div>
</div>

<!-- Main content -->
<div class="max-w-5xl mx-auto px-4 sm:px-6 py-6">

  <!-- Reference drawer (collapsible) -->
  <div class="mb-6">
    <button onclick="toggleRefDrawer()"
      class="flex items-center gap-2 text-xs font-semibold text-indigo-700 hover:text-indigo-900 bg-indigo-50 border border-indigo-200 rounded-xl px-4 py-2.5 w-full text-left transition-colors">
      <span id="ref-drawer-icon">▶</span>
      <span>日本国内承認用量 リファレンスパネル（展開して参照）</span>
    </button>
    <div id="ref-drawer" style="max-height: 0;">
      <div class="bg-white border border-indigo-100 rounded-b-xl p-4 mt-1">
        <p class="text-xs text-gray-500 mb-3">出典: 各薬剤の日本国内添付文書（PMDA）。記載は検証参照用途です。必ず最新版添付文書を確認してください。</p>
        <div class="overflow-x-auto">
          <table class="ref-table w-full border-collapse text-left">
            <thead>
              <tr class="border-b border-gray-200">
                <th class="py-2 px-3 w-36">薬剤名（一般名）</th>
                <th class="py-2 px-3 w-28">商品名</th>
                <th class="py-2 px-3">適応（日本）</th>
                <th class="py-2 px-3 w-48">用量（mg/日）</th>
                <th class="py-2 px-3">主な注意点</th>
              </tr>
            </thead>
            <tbody id="ref-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Card list -->
  <div id="card-list" class="space-y-3"></div>
  <div id="empty-msg" class="hidden text-center py-16 text-gray-400">
    <div class="text-4xl mb-3">🔍</div>
    <p class="text-sm">条件に一致するカードがありません</p>
  </div>
</div>

<!-- Export modal -->
<div id="export-modal" class="hidden" onclick="closeExport(event)">
  <div id="export-body" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
      <h2 class="font-bold text-gray-900 text-sm">検証レポート（Markdown）</h2>
      <div class="flex gap-2">
        <button onclick="copyExport()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">コピー</button>
        <button onclick="closeExport()" class="bg-white hover:bg-gray-50 text-gray-600 text-xs font-medium px-3 py-2 rounded-lg border border-gray-200">閉じる</button>
      </div>
    </div>
    <textarea id="export-text" readonly></textarea>
  </div>
</div>

<script>
/* =====================================================================
   DATA: CARDS
===================================================================== */
const CARDS = [
  // ── 計算ツール ──────────────────────────────────────────────────
  { id: 'card-cp-calc',    section: 'calc', title: '抗精神病薬 CP換算計算機', file: 'cp-calculator.html',
    desc: '世代別（第1世代・第2世代）に分類された抗精神病薬のクロルプロマジン等価換算（稲垣・稲田版）をリアルタイムで計算。経口・持効性注射剤・速効性注射剤に対応。スマホ最適化。' },
  { id: 'card-dzp-calc',   section: 'calc', title: 'ベンゾジアゼピン系 ジアゼパム換算計算機', file: 'dzp-calculator.html',

  // ── 評価スケール ──────────────────────────────────────────────

  { id: 'card-dsm5trmini', section: 'diag', title: 'DSM-5-TR 精神科章立てガイド（ミニ版）', file: 'dsm5trmini.html',

  { id: 'card-depression',  section: 'tx-overview', title: 'うつ病 診断・治療選択ツリー — ガイドライン2025準拠', file: 'depression-guideline2025.html',

  { id: 'card-bipolar',     section: 'tx-overview', title: '双極性障害 診断・治療選択ツリー — 日本うつ病学会 診療ガイドライン2023準拠', file: 'bipolar-diagnosis-treatment.html',

/* =====================================================================
   STATE
===================================================================== */
const STORAGE_KEY = 'contentVerification_v1';
let state = {}; // { cardId: { dosage: 'ok'|'warn'|'flag'|'', notation: ..., terms: ..., confirmed: bool, memo: '' } }

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { state = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getCardState(id) {
  if (!state[id]) state[id] = { dosage: '', notation: '', terms: '', confirmed: false, memo: '' };
  return state[id];
}

/* =====================================================================
   AUTO CHECKS
===================================================================== */
function runAutoChecks(card) {
  const issues = [];
  const text = card.title + ' ' + card.desc;

  // 表記チェック
  for (const rule of NOTATION_RULES) {
    if (rule.pattern.test(text)) {
      issues.push({ axis: 'notation', level: rule.level, msg: rule.msg });
    }
  }

  // 用語チェック
  for (const t of TERM_CHECK_TABLE) {
    if (text.includes(t.bad)) {
      issues.push({ axis: 'terms', level: t.level, msg: `「${t.bad}」→「${t.good}」（${t.note}）` });
    }
  }

  // 略語チェック（薬剤セクションのみ詳細）
  if (card.section === 'drugs' || card.section === 'tx-overview') {
    for (const a of ABBREV_CHECKS) {
      const re = new RegExp('\\b' + a.abbr.replace(/[-+]/g, '\\$&') + '\\b');
      if (re.test(text)) {
        const hasParenDef = text.includes(a.abbr + '（') || text.includes(a.abbr + '(');
        if (!hasParenDef) {
          issues.push({ axis: 'notation', level: a.level, msg: `略語「${a.abbr}」の初出に日本語説明がない可能性（= ${a.full}）` });
        }
      }
    }
  }

  return issues;
}

/* =====================================================================
   RENDER CARDS
===================================================================== */
function shouldShowCard(card, autoIssues, cs) {
  if (filterSection && card.section !== filterSection) return false;
  if (filterSearch) {
    const haystack = (card.title + ' ' + card.desc + ' ' + card.file).toLowerCase();
    if (!haystack.includes(filterSearch)) return false;
  }
  const hasIssues = autoIssues.length > 0 || cs.dosage === 'flag' || cs.dosage === 'warn' ||
                    cs.notation === 'flag' || cs.notation === 'warn' ||
                    cs.terms === 'flag' || cs.terms === 'warn';
  if (filterMode === 'issues' && !hasIssues) return false;
  if (filterMode === 'confirmed' && !cs.confirmed) return false;
  if (filterMode === 'unconfirmed' && cs.confirmed) return false;
  return true;
}

function levelIcon(level) {
  if (level === 'flag') return '<span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1"></span>';
  if (level === 'warn') return '<span class="inline-block w-2 h-2 rounded-full bg-amber-400 mr-1"></span>';
  return '<span class="inline-block w-2 h-2 rounded-full bg-emerald-400 mr-1"></span>';
}

function badgeHtml(level, text) {
  const cls = level === 'flag' ? 'status-flag' : level === 'warn' ? 'status-warn' : 'status-ok';
  return `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${cls}">${text}</span>`;
}

function manualStatus(val) {
  if (val === 'flag') return badgeHtml('flag', '要修正');
  if (val === 'warn') return badgeHtml('warn', '要確認');
  if (val === 'ok')   return badgeHtml('ok', '問題なし');
  return `<span class="text-xs text-gray-400">— 未評価</span>`;
}

  const list = document.getElementById('card-list');
  const sortedCards = [...CARDS].sort((a, b) => {
    const order = ['drugs', 'tx-overview', 'diag', 'scales', 'calc', 'concepts', 'study', 'literature', 'other'];
    return order.indexOf(a.section) - order.indexOf(b.section);
  });

  let html = '';
  let shown = 0;
  let totalFlag = 0, totalWarn = 0, totalConfirmed = 0;

  for (const card of sortedCards) {
    const autoIssues = runAutoChecks(card);
    const cs = getCardState(card.id);

    // Count stats
    const hasFlag = autoIssues.some(i => i.level === 'flag') || cs.dosage === 'flag' || cs.notation === 'flag' || cs.terms === 'flag';
    const hasWarn = !hasFlag && (autoIssues.some(i => i.level === 'warn') || cs.dosage === 'warn' || cs.notation === 'warn' || cs.terms === 'warn');
    if (hasFlag) totalFlag++;
    else if (hasWarn) totalWarn++;
    if (cs.confirmed) totalConfirmed++;

    if (!shouldShowCard(card, autoIssues, cs)) continue;
    shown++;

/* =====================================================================
   INTERACTIONS
===================================================================== */
function toggleCard(id) {
  const detail = document.getElementById(`detail-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  if (!detail) return;
  const isOpen = !detail.classList.contains('hidden');
  detail.classList.toggle('hidden', isOpen);
  if (toggle) toggle.textContent = isOpen ? '▼' : '▲';
  const cs = getCardState(id);
  cs._open = !isOpen;
  saveState();
}

function setAxis(id, axis, val) {
  const cs = getCardState(id);
  cs[axis] = cs[axis] === val ? '' : val;
  saveState();
  renderCards();
  const detail = document.getElementById(`detail-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  if (detail) { detail.classList.remove('hidden'); if (toggle) toggle.textContent = '▲'; }
  const cs2 = getCardState(id);
  cs2._open = true;
  saveState();
}

function saveMemo(id, val) {
  const cs = getCardState(id);
  cs.memo = val;
  saveState();
}

function saveDrCheck(id, idx, checked) {
  const cs = getCardState(id);
  if (!cs.drCheck) cs.drCheck = {};
  cs.drCheck[idx] = checked;
  saveState();
}

function toggleConfirm(id) {
  const cs = getCardState(id);
  cs.confirmed = !cs.confirmed;
  saveState();
  renderCards();
  const detail = document.getElementById(`detail-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  if (detail) { detail.classList.remove('hidden'); if (toggle) toggle.textContent = '▲'; }
  const cs2 = getCardState(id);
  cs2._open = true;
  saveState();
}

function resetAll() {
  if (!confirm('全ての検証状態・メモをリセットしますか？')) return;
  state = {};
  saveState();
  renderCards();
}

/* =====================================================================
   EXPORT
===================================================================== */
function generateReport() {
  const lines = [];
  const now = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
  lines.push(`# 精神科臨床ガイド ポータル — コンテンツ検証レポート`);
  lines.push(`生成日時: ${now}\n`);

  let flagCards = [], warnCards = [], okCards = [], uncheckedCards = [];

  for (const card of CARDS) {
    const autoIssues = runAutoChecks(card);
    const cs = getCardState(card.id);
    const hasAutoFlag = autoIssues.some(i => i.level === 'flag');
    const hasAutoWarn = autoIssues.some(i => i.level === 'warn');
    const manualFlag = cs.dosage === 'flag' || cs.notation === 'flag' || cs.terms === 'flag';
    const manualWarn = cs.dosage === 'warn' || cs.notation === 'warn' || cs.terms === 'warn';

    if (hasAutoFlag || manualFlag) flagCards.push({ card, autoIssues, cs });
    else if (hasAutoWarn || manualWarn) warnCards.push({ card, autoIssues, cs });
    else if (cs.confirmed) okCards.push({ card, autoIssues, cs });
    else uncheckedCards.push({ card, autoIssues, cs });
  }

  lines.push(`## サマリー`);
  lines.push(`- 総カード数: ${CARDS.length}`);
  lines.push(`- 要修正（フラグあり）: ${flagCards.length} 件`);
  lines.push(`- 要確認: ${warnCards.length} 件`);
  lines.push(`- 確認済み（問題なし）: ${okCards.length} 件`);
  lines.push(`- 未チェック: ${uncheckedCards.length} 件\n`);

  if (flagCards.length > 0) {
    lines.push(`## 🔴 要修正 (${flagCards.length} 件)\n`);
    for (const { card, autoIssues, cs } of flagCards) {
      const sec = SECTION_META[card.section];
      lines.push(`### ${sec.label} — ${card.title}`);
      lines.push(`- ファイル: \`${card.file}\``);
      for (const i of autoIssues.filter(x => x.level === 'flag')) {
        lines.push(`- [自動検出 ${i.axis}] ${i.msg}`);
      }
      if (cs.dosage === 'flag') lines.push(`- [手動 用量・用法] 要修正`);
      if (cs.notation === 'flag') lines.push(`- [手動 日本語表記] 要修正`);
      if (cs.terms === 'flag') lines.push(`- [手動 精神医学用語] 要修正`);
      if (cs.memo) lines.push(`- メモ: ${cs.memo}`);
      lines.push('');
    }
  }

  if (warnCards.length > 0) {
    lines.push(`## 🟡 要確認 (${warnCards.length} 件)\n`);
    for (const { card, autoIssues, cs } of warnCards) {
      const sec = SECTION_META[card.section];
      lines.push(`### ${sec.label} — ${card.title}`);
      lines.push(`- ファイル: \`${card.file}\``);
      for (const i of autoIssues.filter(x => x.level === 'warn')) {
        lines.push(`- [自動検出 ${i.axis}] ${i.msg}`);
      }
      if (cs.dosage === 'warn') lines.push(`- [手動 用量・用法] 要確認`);
      if (cs.notation === 'warn') lines.push(`- [手動 日本語表記] 要確認`);
      if (cs.terms === 'warn') lines.push(`- [手動 精神医学用語] 要確認`);
      if (cs.memo) lines.push(`- メモ: ${cs.memo}`);
      lines.push('');
    }
  }

  if (okCards.length > 0) {
    lines.push(`## ✅ 確認済み (${okCards.length} 件)\n`);
    for (const { card } of okCards) {
      const sec = SECTION_META[card.section];
      lines.push(`- ${sec.label} — ${card.title} (\`${card.file}\`)`);
    }
    lines.push('');
  }

  lines.push(`---`);
  lines.push(`検証ツール: content-verification.html`);
  lines.push(`参照: 日本国内添付文書（PMDA）/ 日本精神神経学会用語基準`);

  return lines.join('\n');
}

function openExport() {
  document.getElementById('export-text').value = generateReport();
  document.getElementById('export-modal').classList.remove('hidden');
}
function closeExport(e) {
  if (!e || e.target === document.getElementById('export-modal')) {
    document.getElementById('export-modal').classList.add('hidden');
  }
}
function copyExport() {
  const ta = document.getElementById('export-text');
  ta.select();
  document.execCommand('copy');
  const btn = document.querySelector('#export-body button');
  const orig = btn.textContent;
  btn.textContent = 'コピーしました！';
  setTimeout(() => { btn.textContent = orig; }, 1500);
}

/* =====================================================================
   INIT
===================================================================== */
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderRefTable();
  renderCards();
});
</script>
