<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多領域症例提示ワークスペース — 4ペイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/split.js/dist/split.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --primary: #2d6a4f;
      --primary-dark: #1b4332;
      --border: #d8eadf;
      --border-light: #edf7f1;
      --text: #1e293b;
      --text-muted: #64748b;
      --ok: #2d7a4f;
      --warn: #b45309;
      --fail: #c53030;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-feature-settings: 'palt';
      -webkit-font-smoothing: antialiased;
    }
    .ws-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border-bottom: 1px solid var(--primary-dark);
      flex-shrink: 0;
      z-index: 10;
    }
    .ws-header h1 { font-size: 0.95rem; font-weight: 700; margin: 0; white-space: nowrap; }
    .ws-header-sub { font-size: 0.7rem; opacity: 0.85; }
    .ws-header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .ws-btn {
      padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.12);
      color: #fff; cursor: pointer; transition: background 0.15s;
    }
    .ws-btn:hover { background: rgba(255,255,255,0.22); }
    .ws-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .title-input {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem;
      min-width: 160px; max-width: 220px;
    }
    .title-input::placeholder { color: rgba(255,255,255,0.6); }
    .save-status { font-size: 0.7rem; opacity: 0.9; }
    .save-status.saving { opacity: 0.7; }
    .ws-main { display: flex; height: calc(100vh - 48px); }
    .pane { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
    .pane-header {
      padding: 8px 12px; font-size: 0.72rem; font-weight: 700; color: var(--primary);
      background: var(--border-light); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .pane-body { flex: 1; overflow: auto; min-height: 0; }
    .gutter { background: var(--border); cursor: col-resize; }
    .gutter:hover { background: var(--primary); opacity: 0.5; }
    #palettePane .pane-body { padding: 8px; }
    .palette-suggest-label { font-size: 0.68rem; font-weight: 700; color: var(--primary); margin: 0 0 6px; }
    .palette-suggest-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .palette-suggest-btn {
      text-align: left; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--border-light); font-size: 0.7rem; cursor: pointer; color: var(--text);
    }
    .palette-suggest-btn:hover { border-color: var(--primary); background: #fff; }
    .palette-filters { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .palette-filters input, .palette-filters select {
      width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.72rem;
    }
    .palette-filter-row { display: flex; gap: 8px; font-size: 0.68rem; color: var(--text-muted); }
    .palette-item { display: flex; align-items: stretch; gap: 2px; margin-bottom: 4px; }
    .palette-fav {
      width: 28px; flex-shrink: 0; border: 1px solid var(--border); border-radius: 6px 0 0 6px;
      background: var(--border-light); cursor: pointer; font-size: 0.75rem;
    }
    .palette-link {
      flex: 1; text-align: left; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 0 6px 6px 0; background: #fff; cursor: pointer;
    }
    .palette-link:hover { border-color: var(--primary); background: var(--border-light); }
    .palette-item.is-fav .palette-fav { color: #d97706; }
    .palette-item-title { display: block; font-size: 0.72rem; font-weight: 600; }
    .palette-item-meta { display: block; font-size: 0.62rem; color: var(--text-muted); }
    .palette-empty, .palette-hint { font-size: 0.72rem; color: var(--text-muted); padding: 8px; }
    .ref-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-bottom: 1px solid var(--border); background: var(--border-light); flex-shrink: 0;
    }
    .ref-toolbar button {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
      background: #fff; font-size: 0.68rem; cursor: pointer;
    }
    #refTitle { flex: 1; font-size: 0.72rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #refIframe { width: 100%; height: 100%; border: none; }
    .ref-frame-wrap { flex: 1; position: relative; min-height: 0; }
    .ref-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 24px;
    }
    .hidden { display: none !important; }
    .wizard-scroll { padding: 12px; }
    .doc-meta {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
      padding: 8px; background: var(--border-light); border-radius: 8px; border: 1px solid var(--border);
    }
    .doc-meta label { font-size: 0.65rem; font-weight: 600; display: block; margin-bottom: 2px; }
    .doc-meta input { font-size: 0.72rem; padding: 4px 8px; width: 100%; border: 1px solid var(--border); border-radius: 4px; }
    .case-toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .case-toolbar button {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: #fff; font-size: 0.68rem; font-weight: 600; cursor: pointer; color: var(--primary);
    }
    .case-toolbar button:hover { background: var(--border-light); }
    .case-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .case-btn {
      padding: 6px 10px; border-radius: 8px; border: 2px solid var(--border);
      font-size: 0.72rem; font-weight: 600; cursor: pointer; background: #fff; color: var(--text);
    }
    .case-btn.active { border-color: var(--primary); background: var(--border-light); color: var(--primary); }
    .case-btn.done { border-color: var(--ok); background: #f0fdf4; color: var(--ok); }
    .case-num-badge {
      display: inline-flex; width: 1.2rem; height: 1.2rem; border-radius: 999px;
      background: var(--primary); color: #fff; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700;
    }
    .case-tag { font-size: 0.6rem; color: var(--text-muted); margin-left: 4px; }
    .case-meta-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .step-indicator { display: flex; align-items: flex-end; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
    .step-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .step-dot {
      width: 1.6rem; height: 1.6rem; border-radius: 999px; display: flex; align-items: center;
      justify-content: center; font-size: 0.68rem; font-weight: 700;
    }
    .step-dot.active { background: var(--primary); color: #fff; }
    .step-dot.done { background: var(--ok); color: #fff; }
    .step-dot.pending { background: #e2e8f0; color: var(--text-muted); }
    .step-label { font-size: 0.58rem; margin-top: 4px; text-align: center; color: var(--text-muted); max-width: 4rem; }
    .step-line { flex: 1; height: 2px; background: #e2e8f0; margin: 0 4px 14px; min-width: 10px; }
    .step-line.done { background: var(--ok); }
    .step-page { display: none; }
    .step-page.active { display: block; }
    .wizard-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .wizard-card h2 { font-size: 0.9rem; font-weight: 700; margin: 0; }
    .field-label { font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 4px; }
    input[type=text], input[type=date], select, textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      font-size: 0.78rem; font-family: inherit; color: var(--text);
    }
    textarea { resize: vertical; min-height: 72px; }
    .field-hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .hint-box { padding: 8px 10px; border-radius: 8px; font-size: 0.72rem; line-height: 1.6; margin: 8px 0; background: var(--border-light); border-left: 3px solid var(--primary); }
    .icd-group-title { font-size: 0.72rem; font-weight: 700; padding: 4px 8px; background: var(--border-light); border-radius: 4px; margin-bottom: 6px; }
    .icd-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .icd-chip { padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); font-size: 0.68rem; cursor: pointer; background: #fff; }
    .icd-chip.selected { background: var(--primary); border-color: var(--primary); color: #fff; }
    .step-nav { display: flex; justify-content: space-between; margin-top: 16px; gap: 8px; }
    .btn-primary, .btn-secondary {
      padding: 8px 16px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: var(--text); }
    .step-toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn-step-copy {
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--border-light); font-size: 0.68rem; font-weight: 600; cursor: pointer; color: var(--primary);
    }
    #checkPane .pane-body { padding: 8px; }
    .coverage-title { font-size: 0.68rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .coverage-grid { display: flex; gap: 6px; margin-bottom: 4px; }
    .coverage-cell {
      flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 4px;
      border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.65rem;
    }
    .coverage-cell.empty { opacity: 0.5; cursor: default; }
    .coverage-cell.draft { border-color: #94a3b8; }
    .coverage-cell.ready { border-color: var(--warn); background: #fffbeb; }
    .coverage-cell.presented { border-color: var(--ok); background: #f0fdf4; }
    .coverage-sym { font-size: 0.9rem; font-weight: 700; }
    .coverage-legend { font-size: 0.6rem; color: var(--text-muted); margin: 0 0 10px; }
    .check-progress-bar { height: 6px; background: var(--border-light); border-radius: 999px; overflow: hidden; }
    .check-progress-fill { height: 100%; background: var(--primary); transition: width 0.2s; }
    .check-progress-text { font-size: 0.72rem; margin: 6px 0 10px; }
    .check-fail { color: var(--fail); font-weight: 600; }
    .check-warn { color: var(--warn); font-weight: 600; }
    .check-group { margin-bottom: 10px; }
    .check-group-title {
      font-size: 0.68rem; font-weight: 700; color: var(--primary);
      padding: 4px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .check-row { display: flex; gap: 6px; padding: 5px 6px; border-radius: 4px; font-size: 0.68rem; line-height: 1.4; margin-bottom: 2px; }
    .check-row.clickable { cursor: pointer; }
    .check-row.clickable:hover { background: var(--border-light); }
    .check-row.checked .check-icon { color: var(--ok); }
    .check-row.fail .check-label { color: var(--fail); }
    .check-row.warn .check-label { color: var(--warn); }
    .check-icon { flex-shrink: 0; width: 14px; font-weight: 700; }
    .ws-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff; padding: 10px 18px; border-radius: 8px;
      font-size: 0.8rem; z-index: 200; transition: transform 0.25s; max-width: 90vw;
    }
    .ws-toast.show { transform: translateX(-50%) translateY(0); }
    .narrow-banner {
      position: fixed; inset: 0; background: rgba(30,41,59,0.55); z-index: 150;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .narrow-banner-inner { background: #fff; border-radius: 12px; padding: 24px; max-width: 400px; text-align: center; border: 2px solid var(--primary); }
    .offline-banner { background: #fef3c7; color: #92400e; text-align: center; font-size: 0.72rem; padding: 6px 12px; border-bottom: 1px solid #fcd34d; }
    .ws-drawer-root { position: absolute; inset: 0; z-index: 30; display: flex; justify-content: flex-end; }
    .ws-drawer-root.hidden { display: none; }
    .ws-drawer-overlay { position: absolute; inset: 0; background: rgba(30,41,59,0.25); }
    .ws-drawer-panel {
      position: relative; width: min(420px, 92%); height: 100%; background: #fff;
      border-left: 1px solid var(--border); display: flex; flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
    }
    .ws-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--border-light);
    }
    .ws-drawer-header h3 { margin: 0; font-size: 0.82rem; color: var(--primary); }
    .ws-drawer-close { border: none; background: none; font-size: 1.2rem; cursor: pointer; }
    .ws-drawer-body { flex: 1; overflow: auto; padding: 12px 14px; }
    .ws-drawer-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); }
    .draft-pre {
      font-family: 'Noto Sans JP', monospace; font-size: 0.72rem; line-height: 1.7;
      white-space: pre-wrap; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
    }
    .modal-root { position: fixed; inset: 0; z-index: 100; background: rgba(30,41,59,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-root.hidden { display: none; }
    .modal-panel { background: #fff; border-radius: 12px; padding: 20px; max-width: 360px; width: 100%; border: 1px solid var(--border); }
    .step-copy-label { display: block; font-size: 0.8rem; margin-bottom: 6px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .snapshot-input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem; margin-bottom: 8px; }
    .version-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .btn-restore, .btn-delete { font-size: 0.68rem; padding: 4px 10px; border-radius: 5px; cursor: pointer; }
    #wizardPane { position: relative; }
    @media print {
      body * { visibility: hidden; }
      #previewDrawer .ws-drawer-panel, #previewDrawer .ws-drawer-panel * { visibility: visible; }
      #previewDrawer { position: absolute; inset: 0; }
      #previewDrawer .ws-drawer-overlay, #previewDrawer .ws-drawer-header, #previewDrawer .ws-drawer-actions { display: none; }
    }
  </style>
</head>
<body>

<div id="narrowBanner" class="narrow-banner hidden">
  <div class="narrow-banner-inner">
    <h2>ワイド画面推奨</h2>
    <p>4ペインワークスペースは横幅 1280px 以上での利用を推奨します。</p>
    <button class="btn-primary" id="narrowDismiss">了解して続ける</button>
  </div>
</div>

<div id="offlineBanner" class="offline-banner hidden">オフライン同梱データで動作中</div>

<header class="ws-header">
  <div>
    <h1>多領域症例提示ワークスペース</h1>
    <div class="ws-header-sub">F章横断 · 症例カンファ · 4ペイン</div>
  </div>
  <input type="text" id="titleInput" class="title-input" placeholder="症例集タイトル" value="無題の症例集">
  <span id="saveStatus" class="save-status">—</span>
  <div class="ws-header-actions">
    <button class="ws-btn" id="btnUndo" disabled>↶ 戻す</button>
    <button class="ws-btn" id="btnRedo" disabled>↷ やり直し</button>
    <button class="ws-btn" id="btnSnapshot">スナップショット</button>
    <button class="ws-btn" id="btnNew">新規</button>
    <button class="ws-btn" id="btnImport">JSON 読込</button>
    <button class="ws-btn" id="btnExport">JSON 出力</button>
    <button class="ws-btn" id="btnRefNewTab">参照を新しいタブ</button>
    <a href="top.html" class="ws-btn" style="text-decoration:none">ポータル</a>
  </div>
</header>

<div class="ws-main">
  <div id="palettePane" class="pane">
    <div class="pane-header">ツールパレット</div>
    <div class="pane-body">
      <div id="paletteSuggest"></div>
      <div class="palette-filters">
        <input type="search" id="paletteSearch" placeholder="ツールを検索…">
        <select id="paletteSection"><option value="">すべて</option></select>
        <div class="palette-filter-row">
          <label><input type="checkbox" id="paletteRelevant"> 症例提示向け</label>
          <label><input type="checkbox" id="paletteFavOnly"> お気に入り</label>
        </div>
      </div>
      <div id="paletteList"></div>
    </div>
  </div>

  <div id="refPane" class="pane">
    <div class="pane-header">参照ペイン</div>
    <div class="ref-toolbar hidden">
      <button type="button" id="refBack">←</button>
      <button type="button" id="refForward">→</button>
      <button type="button" id="refReload">↻</button>
      <span id="refTitle">—</span>
      <button type="button" id="refNewTab">↗</button>
    </div>
    <div class="ref-frame-wrap pane-body" style="padding:0">
      <div id="refPlaceholder" class="ref-placeholder">左のパレットからツールを選択すると<br>ここに表示されます</div>
      <iframe id="refIframe" class="hidden" title="参照ツール"></iframe>
    </div>
  </div>

  <div id="wizardPane" class="pane">
    <div class="pane-header">症例提示入力</div>
    <div class="pane-body wizard-scroll">
      <div class="doc-meta">
        <div><label>発表者</label><input type="text" data-meta="presenter" placeholder="氏名"></div>
        <div><label>所属</label><input type="text" data-meta="institution" placeholder="病院・大学"></div>
        <div><label>指導医（任意）</label><input type="text" data-meta="supervisor" placeholder="指導医名"></div>
      </div>

      <div class="case-toolbar">
        <button type="button" id="btnAddCase">＋ 症例追加</button>
        <button type="button" id="btnDupCase">複製</button>
        <button type="button" id="btnDelCase">削除</button>
      </div>
      <div class="case-selector" id="caseList"></div>

      <div class="case-meta-row">
        <div><label class="field-label">症例名</label><input type="text" id="caseLabel"></div>
        <div>
          <label class="field-label">F章タグ</label>
          <select id="caseDomainTag">
            <option value="">選択</option>
            <option value="F0">F0 器質性</option>
            <option value="F1">F1 物質関連</option>
            <option value="F2">F2 統合失調症</option>
            <option value="F3">F3 気分障害</option>
            <option value="F4-9">F4〜F9 その他</option>
          </select>
        </div>
        <div>
          <label class="field-label">ステータス</label>
          <select id="caseStatus">
            <option value="draft">下書き</option>
            <option value="ready">提示準備完了</option>
            <option value="presented">提示済み</option>
          </select>
        </div>
      </div>

      <div class="step-toolbar">
        <button type="button" id="btnStepCopy" class="btn-step-copy hidden">他症例へコピー</button>
      </div>

      <div class="step-indicator">
        <div class="step-col"><div class="step-dot active" id="sd1">1</div><div class="step-label">概要</div></div>
        <div class="step-line" id="sl12"></div>
        <div class="step-col"><div class="step-dot pending" id="sd2">2</div><div class="step-label">背景</div></div>
        <div class="step-line" id="sl23"></div>
        <div class="step-col"><div class="step-dot pending" id="sd3">3</div><div class="step-label">病歴評価</div></div>
        <div class="step-line" id="sl34"></div>
        <div class="step-col"><div class="step-dot pending" id="sd4">4</div><div class="step-label">診断</div></div>
        <div class="step-line" id="sl45"></div>
        <div class="step-col"><div class="step-dot pending" id="sd5">5</div><div class="step-label">治療</div></div>
        <div class="step-line" id="sl56"></div>
        <div class="step-col"><div class="step-dot pending" id="sd6">6</div><div class="step-label">学習</div></div>
      </div>

      <div class="wizard-card step-page active" id="page1">
        <h2 class="mb-4">症例概要</h2>
        <div id="domainHint" class="hint-box mb-3"></div>
        <div class="grid-2">
          <div><label class="field-label">提示日</label><input type="date" id="t1_present_date"></div>
          <div>
            <label class="field-label">診療場面</label>
            <select id="t1_setting">
